name: Update proXSign

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run update script
        id: update
        run: |
          CURRENT=$(grep -oP 'version = "\K[^"]+' default.nix)
          ./update.sh
          LATEST=$(grep -oP 'version = "\K[^"]+' default.nix)

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify build
        if: steps.update.outputs.updated == 'true'
        run: NIXPKGS_ALLOW_UNFREE=1 nix build --impure -L .#proxsign

      - name: Push update
        if: steps.update.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add default.nix
          git commit -m "proXSign: ${{ steps.update.outputs.current }} -> ${{ steps.update.outputs.latest }}"
          git push
